apiVersion: apps/v1
kind: Deployment
metadata:
  name: employee-deployment
  labels:
    app: employee
spec:
  replicas: 3
  selector:
    matchLabels:
      app: employee
  template:
    metadata:
      labels:
        app: employee
    spec:
      containers:
        - name: employee
          image: iep-employee:1.0
          ports:
            - containerPort: 5001
          env:
            - name: MONGO_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: db-username
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongo-password
                  key: password
            - name: MONGO_URL
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: db-host
            - name: MONGO_PORT
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: db-port
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: redis-host
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: redis-port
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: jwt-key
                  key: value
---
apiVersion: v1
kind: Service
metadata:
  name: employee-service
spec:
  type: LoadBalancer
  selector:
    app: employee
  ports:
    - protocol: TCP
      port: 5002
      targetPort: 5001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: director-deployment
  labels:
    app: director
spec:
  replicas: 1
  selector:
