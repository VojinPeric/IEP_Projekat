      labels:
        app: director
    spec:
      containers:
        - name: director
          image: iep-director:1.0
          ports:
            - containerPort: 5001
          env:
            - name: MONGO_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: db-username
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongo-password
                  key: password
            - name: MONGO_URL
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: db-host
            - name: MONGO_PORT
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: db-port
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: redis-host
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: redis-port
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: jwt-key
                  key: value
            - name: GANACHE_URL
              valueFrom:
                configMapKeyRef:
                  name: service-config
