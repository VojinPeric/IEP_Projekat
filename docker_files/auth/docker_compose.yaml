services:
  database:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=root
    ports:
      - 3306:3306
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10
  adminer:
    image: adminer:4.8.1
    ports:
      - 8080:8080
    depends_on:
      database:
        condition: service_healthy
  migrator:
    image: iep-auth-migration:2.0
    environment:
      - MYSQL_DATABASE=authentication
      - MYSQL_USERNAME=root
      - MYSQL_PASSWORD=root
      - MYSQL_URL=database
      - MYSQL_PORT=3306
      - JWT_SECRET_KEY=JWT_SECRET_KEY
    depends_on:
      database:
        condition: service_healthy
  application:
    image: iep-auth:1.0
    environment:
      - MYSQL_DATABASE=authentication
      - MYSQL_USERNAME=root
      - MYSQL_PASSWORD=root
      - MYSQL_URL=database
      - MYSQL_PORT=3306
      - JWT_SECRET_KEY=JWT_SECRET_KEY
    ports:
      - 5001:5001
